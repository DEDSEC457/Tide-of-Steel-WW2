name: Deploy The World at War (WebGL)

# Builds world-at-war/ and publishes it to GitHub Pages, giving a URL you can
# open from any computer. Requires Pages → Source = "GitHub Actions" (set once
# in the repo Settings → Pages).
on:
  push:
    branches: [main]
    paths:
      - 'world-at-war/**'
      - '.github/workflows/deploy-waw.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: world-at-war/package-lock.json
      - name: Install & build
        working-directory: world-at-war
        run: |
          npm ci
          npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: world-at-war/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
