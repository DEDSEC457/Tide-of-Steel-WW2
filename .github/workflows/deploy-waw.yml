name: Build The World at War (single-file)

# Builds world-at-war/ into ONE self-contained index.html and uploads it as a
# downloadable artifact. Works on a private repo (no GitHub Pages needed) — grab
# the artifact from the run, then double-click it or email it to anyone.
# (When you're ready to launch publicly, this can switch back to Pages.)
on:
  push:
    branches: [main]
    paths:
      - 'world-at-war/**'
      - '.github/workflows/deploy-waw.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: world-at-war/package-lock.json
      - name: Install & build single-file
        working-directory: world-at-war
        run: |
          npm ci
          npm run build
      - name: Upload the playable single-file game
        uses: actions/upload-artifact@v4
        with:
          name: world-at-war-game
          path: world-at-war/dist/index.html
          if-no-files-found: error
