name: Deploy game to GitHub Pages

# Every push to main redeploys the game, so a shared link is always current.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never let two deploys race; the newest push wins.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true        # turns Pages on automatically on the first run
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'               # the game is the self-contained index.html at the repo root
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
