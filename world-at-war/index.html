<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>The World at War</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #0c1018; overflow: hidden;
        font-family: 'Segoe UI', system-ui, sans-serif; color: #e8e8e0; }
      #app { position: fixed; inset: 0; }
      #hud { position: fixed; top: 0; left: 0; right: 0; height: 34px; display: flex;
        align-items: center; gap: 14px; padding: 0 14px; pointer-events: none;
        background: linear-gradient(#0c1018ee, #0c101800); font-size: 13px; letter-spacing: 1px; }
      #hud b { color: #e2bc46; }
      #tip { position: fixed; bottom: 10px; left: 12px; font-size: 12px; color: #9aa3ad;
        pointer-events: none; }
      #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        font-size: 15px; letter-spacing: 2px; color: #9aa3ad; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud"><span>⚙ <b>THE WORLD AT WAR</b></span><span id="status">EUROPE · 1939</span></div>
    <div id="tip">drag to pan · scroll to zoom</div>
    <div id="loading">building the theatre of war…</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
